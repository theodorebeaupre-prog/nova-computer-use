name: Feature request
description: Suggest a focused improvement to Nova Computer Use.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem and the smallest safe improvement that would solve it. Do not include screenshots, captured screens, private Accessibility text, or other sensitive data.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation should Nova address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Explain the expected behavior and user experience.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or smaller approaches did you consider?
    validations:
      required: false

  - type: textarea
    id: security
    attributes:
      label: Security and privacy impact
      description: Note any effect on permissions, screen captures, Accessibility data, typed text, network access, or local configuration.
    validations:
      required: true

  - type: checkboxes
    id: scope-confirmation
    attributes:
      label: Scope confirmation
      options:
        - label: I understand that Nova does not bypass macOS permissions or edit TCC.
          required: true
