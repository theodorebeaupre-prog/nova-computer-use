name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build universal plugin
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run Swift tests
        run: swift test

      - name: Compile x86_64 and arm64 universal plugin
        run: scripts/build-universal.sh

      - name: Verify the universal plugin
        run: scripts/verify-release.sh dist/NovaComputerUsePlugin

      - name: Run universal-build and installer fixtures
        run: bash Tests/ScriptTests/UniversalBuildTests.sh

      - name: Check whitespace
        run: git diff --check
